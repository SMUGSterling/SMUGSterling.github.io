<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name and Date Export</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
    }

    input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.2);
      border-color: var(--accent);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: var(--accent);
    }

    button:hover {
      background: var(--accent-hover);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Export Form</h1>

    <div class="field">
      <label for="name">NAME</label>
      <input id="name" name="name" type="text" placeholder="Enter your name" />
    </div>

    <div class="field">
      <label for="date">DATE</label>
      <input id="date" name="date" type="date" readonly />
    </div>

    <button id="downloadBtn" type="button">Download .txt File</button>
    <p class="hint">The downloaded file will include the labels and the entered values.</p>
  </main>

  <script>
    const nameInput = document.getElementById('name');
    const dateInput = document.getElementById('date');
    const downloadBtn = document.getElementById('downloadBtn');

    const today = new Date();
    const localDate = new Date(today.getTime() - today.getTimezoneOffset() * 60000)
      .toISOString()
      .split('T')[0];

    dateInput.value = localDate;

    downloadBtn.addEventListener('click', () => {
      const content = `NAME\n${nameInput.value || ''}\n\nDATE\n${dateInput.value}`;
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');

      link.href = url;
      link.download = 'form-data.txt';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
