<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Post Maker - Educational Tool</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --border-color: #dbdbdb;
            --text-main: #262626;
            --secondary-text: #8e8e8e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Instagram brand gradient background */
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-main);
            margin: 0;
            box-sizing: border-box;
        }

        /* Tool Controls */
        #controls {
            background: white;
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 40px;
            width: 500px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .control-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        /* Post Container */
        .post-container {
            background: white;
            width: 470px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); /* Deep shadow from reference */
        }

        .header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            position: relative;
        }

        /* Gradient Story Ring */
        .avatar-ring {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: white;
            border: 2px solid white;
            object-fit: cover;
        }

        .username {
            font-weight: 600;
            font-size: 14px;
            outline: none;
        }

        .more-options {
            margin-left: auto;
            cursor: pointer;
        }

        .main-image {
            width: 100%;
            display: block;
            background: #efefef;
            min-height: 470px;
            object-fit: cover;
        }

        /* Interaction Icons Bar */
        .interaction-bar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            position: relative;
        }

        .icon-group-left {
            display: flex;
            gap: 16px;
        }

        .icon-group-right {
            margin-left: auto;
        }

        .action-icon {
            cursor: pointer;
        }

        /* Pagination Dots */
        .pagination-dots {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #dbdbdb;
        }

        .dot.active {
            background: #0095f6;
        }

        .interactions-text {
            padding: 0 16px;
        }

        .likes {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            outline: none;
        }

        .caption {
            font-size: 14px;
            margin-bottom: 6px;
        }

        .caption-more {
            color: var(--secondary-text);
            cursor: pointer;
        }

        .comment-list {
            padding: 0 16px 16px 16px;
            font-size: 14px;
            line-height: 1.5;
        }

        .comment-item {
            margin-top: 4px;
        }

        .comment-user {
            font-weight: 600;
            margin-right: 5px;
            outline: none;
        }

        .comment-text {
            outline: none;
        }

        [contenteditable="true"]:hover {
            background: rgba(0,0,0,0.03);
            border-radius: 2px;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.03);
        }

        button.ui-btn {
            cursor: pointer;
            padding: 6px 12px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
        }

        button.ui-btn:hover { background: #1877f2; }
        button.ui-btn.dark { background: #333; }
        button.ui-btn.dark:hover { background: #000; }
    </style>
</head>
<body>

<div id="controls">
    <div class="control-group">
        <strong>Poster Avatar:</strong>
        <input type="text" id="avatarInput" placeholder="Paste image URL here">
        <button class="ui-btn" onclick="updateAvatar()">Set</button>
    </div>
    <div class="control-group">
        <strong>Post Photo:</strong>
        <input type="text" id="imgInput" placeholder="Paste image URL here">
        <button class="ui-btn" onclick="updateMainImage()">Set</button>
    </div>
    <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
        <button class="ui-btn dark" onclick="addComment()">+ Add New Comment Row</button>
    </div>
</div>

<div class="post-container">
    <div class="header">
        <div class="avatar-ring">
            <img src="https://via.placeholder.com/150" class="avatar" id="posterAvatar">
        </div>
        <span class="username" contenteditable="true">yourusername</span>

        <svg aria-label="More options" class="more-options" fill="#262626" height="24" role="img" viewBox="0 0 24 24" width="24">
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="12" cy="5" r="1.5"></circle>
            <circle cx="12" cy="19" r="1.5"></circle>
        </svg>
    </div>

    <img src="https://via.placeholder.com/470x470?text=Post+Image" class="main-image" id="postImg">

    <div class="interaction-bar">
        <div class="icon-group-left">
            <svg aria-label="Like" class="action-icon" fill="#ed4956" height="24" role="img" viewBox="0 0 48 48" width="24">
                <path d="M34.6 3.1c-4.5 0-7.9 1.8-10.6 5.6-2.7-3.7-6.1-5.5-10.6-5.5C6 3.1 0 9.6 0 17.6c0 7.3 5.4 12 10.6 16.5.6.5 1.3 1.1 1.9 1.7l2.3 2c4.4 3.9 6.6 5.9 7.6 6.5.5.3 1.1.5 1.6.5s1.1-.2 1.6-.5c1-.6 2.8-2.2 7.8-6.8l2-1.8c.7-.6 1.3-1.2 2-1.7C42.7 29.6 48 25 48 17.6c0-8-6-14.5-13.4-14.5z"></path>
            </svg>
            <svg aria-label="Comment" class="action-icon" fill="#262626" height="24" role="img" viewBox="0 0 24 24" width="24">
                <path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L22 22Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
            <svg aria-label="Share Post" class="action-icon" fill="#262626" height="24" role="img" viewBox="0 0 24 24" width="24">
                <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="22" x2="9.218" y1="3" y2="10.083"></line>
                <polygon fill="none" points="11.698 20.334 22 3.001 2 3.001 9.218 10.084 11.698 20.334" stroke="currentColor" stroke-linejoin="round" stroke-width="2"></polygon>
            </svg>
        </div>

        <div class="pagination-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="icon-group-right">
            <svg aria-label="Save" class="action-icon" fill="#262626" height="24" role="img" viewBox="0 0 24 24" width="24">
                <polygon fill="none" points="20 21 12 13.44 4 21 4 3 20 3 20 21" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></polygon>
            </svg>
        </div>
    </div>

    <div class="interactions-text">
        <div class="likes" contenteditable="true">4,643 likes</div>
        <div class="caption">
            <span class="username" id="captionUsername" contenteditable="true">yourusername</span>
            <span class="comment-text" contenteditable="true">Lorem ipsum dolor sit amet, consectetur adipisicing elit...</span>
            <span class="caption-more" contenteditable="true">more</span>
        </div>
    </div>

    <div class="comment-list" id="commentList">
        </div>
</div>

<script>
    function updateAvatar() {
        const url = document.getElementById('avatarInput').value;
        if (url) {
            document.getElementById('posterAvatar').src = url;
        }
    }

    function updateMainImage() {
        const url = document.getElementById('imgInput').value;
        if (url) {
            document.getElementById('postImg').src = url;
        }
    }

    function addComment() {
        const list = document.getElementById('commentList');
        const newItem = document.createElement('div');
        newItem.className = 'comment-item';
        newItem.innerHTML = `
            <span class="comment-user" contenteditable="true">new_user</span>
            <span class="comment-text" contenteditable="true">Enter a comment for analysis...</span>
        `;
        list.appendChild(newItem);
    }

    // Sync the caption username with the header username automatically
    const headerUsername = document.querySelector('.header .username');
    const captionUsername = document.getElementById('captionUsername');

    headerUsername.addEventListener('input', () => {
        captionUsername.innerText = headerUsername.innerText;
    });
</script>

</body>
</html>
